<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
:root{
  --bg:#F8F8F7;
  --ink:#141414;
  --sage:#B8C4C2;           /* primary accent */
  --sage-deep:#6B7F7D;      /* secondary accent */
  --sage-wash:rgba(184,196,194,0.18);
  --sage-wash-soft:rgba(184,196,194,0.10);
  --sage-line:rgba(107,127,125,0.22);
  --ink-60:rgba(20,20,20,0.60);
  --ink-45:rgba(20,20,20,0.45);
  --ink-25:rgba(20,20,20,0.22);
  --hairline:rgba(20,20,20,0.10);
  --hairline-soft:rgba(20,20,20,0.06);
  --radius:2px;
  --radius-sm:2px;
}
html,body{
  height:auto;min-height:100%;background:var(--bg);
  font-family:'DM Sans',sans-serif;color:var(--ink);
  -webkit-text-size-adjust:100%;overflow-x:hidden;overflow-y:auto;margin:0;padding:0;
  font-weight:400;
  letter-spacing:0.005em;
}
#app{background:var(--bg);width:100%;display:flex;flex-direction:column;}

/* ============ WELCOME ============ */
.screen-welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:140px 36px 160px;flex:1;position:relative;overflow:hidden;min-height:720px;
}
.screen-welcome::before{
  content:'';position:absolute;left:50%;top:92px;transform:translateX(-50%);
  width:56px;height:1px;background:var(--sage-deep);opacity:0.7;
}
.welcome-eyebrow{
  color:var(--sage-deep);letter-spacing:0.42em;font-size:11px;text-transform:uppercase;
  font-weight:500;margin-bottom:56px;position:relative;
}
.welcome-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(68px,13vw,128px);
  font-weight:400;color:var(--ink);
  line-height:0.92;letter-spacing:-0.022em;
  margin-bottom:0;position:relative;
}
.welcome-title .line{display:block;}
.welcome-title em{font-style:italic;font-weight:400;color:var(--sage-deep);}
.welcome-rule{
  width:1px;height:72px;background:var(--ink);opacity:0.28;
  margin:56px auto;position:relative;
}
.welcome-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,2.6vw,24px);
  font-style:italic;
  color:var(--ink);opacity:0.78;
  max-width:520px;line-height:1.55;margin-bottom:72px;position:relative;
  text-wrap:pretty;
}
.welcome-sub em{font-style:normal;color:var(--sage-deep);}
.btn-begin{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--ink);border:1px solid var(--ink);
  color:var(--bg);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.36em;text-transform:uppercase;
  padding:22px 64px;cursor:pointer;
  transition:background 0.25s ease,color 0.25s ease,letter-spacing 0.25s ease;
  -webkit-tap-highlight-color:transparent;position:relative;
}
.btn-begin:hover,.btn-begin:active{
  background:var(--sage-deep);border-color:var(--sage-deep);color:var(--bg);
  letter-spacing:0.42em;
}
.welcome-note{
  font-size:11px;color:var(--ink-45);margin-top:28px;position:relative;
  letter-spacing:0.24em;text-transform:uppercase;
}

/* ============ PROGRESS ============ */
.progress-wrap{
  height:1px;background:var(--hairline);flex-shrink:0;
  position:sticky;top:0;z-index:10;
}
.progress-fill{
  height:1px;background:var(--sage-deep);
  transition:width 0.65s cubic-bezier(0.4,0,0.2,1);
}
.content-wrap{width:100%;max-width:720px;margin:0 auto;}

/* ============ CHAT HEADER ============ */
.chat-header{
  padding:28px 28px 22px;
  display:flex;align-items:center;gap:14px;flex-shrink:0;
  background:var(--bg);
}
.avatar{
  width:30px;height:30px;border:1px solid var(--sage-deep);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.avatar-dot{width:8px;height:8px;background:var(--sage-deep);border-radius:50%;}
.chat-name{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;color:var(--ink);font-weight:400;letter-spacing:0.01em;
}
.prog-label{
  margin-left:auto;font-size:10px;color:var(--ink-45);
  letter-spacing:0.28em;text-transform:uppercase;font-weight:500;
}

/* ============ MESSAGES ============ */
.messages{
  padding:28px 28px 16px;display:flex;flex-direction:column;gap:14px;
  flex:0 0 auto;min-height:0;
}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{display:flex;gap:14px;align-items:flex-start;max-width:90%;}
.msg-bot.new{animation:slideUp 0.35s ease forwards;}
.bot-icon{
  width:22px;height:22px;border:1px solid var(--sage-deep);border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:4px;
}
.bot-dot{width:6px;height:6px;background:var(--sage-deep);border-radius:50%;}
.bot-bbl{
  background:transparent;
  border-left:1px solid var(--sage-line);
  padding:4px 0 4px 18px;
  font-size:clamp(15px,2.3vw,16px);color:var(--ink);
  line-height:1.75;font-weight:400;
  text-wrap:pretty;
}
.msg-user{display:flex;justify-content:flex-end;}
.msg-user.new{animation:slideUp 0.25s ease forwards;}
.user-bbl{
  background:transparent;
  border:none;
  padding:4px 18px 4px 0;
  border-right:1px solid var(--sage-line);
  font-size:clamp(14px,2.1vw,15px);
  color:var(--ink-60);
  max-width:80%;line-height:1.65;
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(16px,2.2vw,18px);
  text-align:right;
}
.typing-bubble{display:flex;gap:14px;align-items:flex-start;animation:slideUp 0.22s ease forwards;}
.typing-dots{
  padding:10px 0 10px 18px;
  border-left:1px solid var(--sage-line);
  display:flex;align-items:center;gap:6px;
}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.3}40%{transform:translateY(-4px);opacity:1}}
.td{width:5px;height:5px;background:var(--sage-deep);border-radius:50%;}
.td1{animation:bounce 1.2s infinite 0s;}.td2{animation:bounce 1.2s infinite 0.2s;}.td3{animation:bounce 1.2s infinite 0.4s;}

/* ============ QUESTION PANEL ============ */
.q-panel{
  background:var(--bg);
  border-top:1px solid var(--hairline-soft);
  flex-shrink:0;margin-top:20px;
}
.q-header{padding:32px 28px 0;}
.q-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,3.2vw,28px);
  color:var(--ink);
  line-height:1.3;font-weight:400;
  letter-spacing:-0.005em;
  text-wrap:pretty;
  max-width:620px;
}
.q-options{
  padding:28px 28px 36px;
  display:flex;flex-direction:column;gap:0;
  border-top:1px solid var(--hairline-soft);margin-top:28px;
}
.btn-opt{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--hairline);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-size:clamp(14px,2vw,15px);
  padding:20px 4px 20px 0;
  cursor:pointer;border-radius:0;
  text-align:left;line-height:1.4;
  min-height:60px;
  transition:padding 0.2s ease,color 0.2s ease,border-color 0.2s ease,background 0.2s ease;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:relative;font-weight:400;
}
.btn-opt::after{
  content:'';width:18px;height:1px;background:var(--ink-25);
  transition:width 0.25s ease,background 0.25s ease;flex-shrink:0;
}
.btn-opt:hover,.btn-opt:active{
  color:var(--sage-deep);
  padding-left:12px;
  border-color:var(--sage-deep);
}
.btn-opt:hover::after,.btn-opt:active::after{
  width:28px;background:var(--sage-deep);
}
.btn-opt.selected{
  color:var(--sage-deep);
  padding-left:12px;
  background:var(--sage-wash-soft);
  border-color:var(--sage-deep);
}
.btn-opt.selected::after{width:28px;background:var(--sage-deep);}

/* ============ TAP-TO-RANK ============ */
.rank-hint{
  font-size:12px;color:var(--ink-45);margin-top:14px;
  padding:0 28px;line-height:1.6;
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
}
.rank-opts{
  padding:24px 28px 0;display:flex;flex-direction:column;gap:0;
  border-top:1px solid var(--hairline-soft);margin-top:24px;
}
.btn-rank{
  background:transparent;
  border:none;
  border-bottom:1px solid var(--hairline);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-size:clamp(14px,2vw,15px);
  padding:18px 4px;cursor:pointer;border-radius:0;
  text-align:left;line-height:1.35;min-height:58px;
  transition:color 0.2s ease,border-color 0.2s ease,padding 0.2s ease,background 0.2s ease;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:18px;width:100%;
}
.btn-rank:hover{color:var(--sage-deep);border-color:var(--sage-deep);padding-left:12px;background:var(--sage-wash-soft);}
.btn-rank.ranked{
  color:var(--ink);
  border-color:var(--sage-deep);
  background:var(--sage-wash-soft);
  padding-left:12px;
}
.rank-badge{
  width:28px;height:28px;border-radius:50%;
  background:transparent;
  border:1px solid var(--sage-deep);
  color:var(--sage-deep);
  font-family:'Cormorant Garamond',serif;
  font-size:14px;font-weight:400;
  font-style:italic;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  opacity:0;transform:scale(0.85);
  transition:opacity 0.2s ease,transform 0.25s ease,background 0.2s ease,color 0.2s ease;
}
.btn-rank.ranked .rank-badge{
  opacity:1;transform:scale(1);
  background:var(--sage-deep);color:var(--bg);
}
.rank-label{flex:1;}
.rank-footer{
  padding:24px 28px 36px;
  display:flex;align-items:center;justify-content:space-between;gap:18px;
}
.rank-tally{
  font-size:11px;color:var(--ink-45);
  letter-spacing:0.24em;text-transform:uppercase;
}
.btn-rank-next{
  background:var(--ink);color:var(--bg);border:1px solid var(--ink);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.3em;text-transform:uppercase;
  padding:16px 38px;cursor:pointer;border-radius:var(--radius-sm);
  transition:background 0.2s,border-color 0.2s,color 0.2s,opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-rank-next:disabled{
  opacity:0.22;cursor:default;background:transparent;color:var(--ink);
}
.btn-rank-next:not(:disabled):hover{
  background:var(--sage-deep);border-color:var(--sage-deep);
}

/* ============ CHECKBOX TOOLS ============ */
.tools-grid{
  padding:24px 28px 0;display:grid;grid-template-columns:1fr 1fr;
  gap:0;
  border-top:1px solid var(--hairline-soft);margin-top:24px;
  border-left:1px solid var(--hairline-soft);
}
.btn-tool-check{
  background:transparent;
  border:none;
  border-right:1px solid var(--hairline);
  border-bottom:1px solid var(--hairline);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-size:clamp(13px,1.9vw,14px);
  padding:18px 18px;cursor:pointer;border-radius:0;
  text-align:left;line-height:1.35;min-height:56px;
  transition:color 0.2s ease,background 0.2s ease;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:14px;
}
.btn-tool-check:hover{color:var(--sage-deep);background:var(--sage-wash-soft);}
.btn-tool-check.selected{color:var(--ink);background:var(--sage-wash);}
.tool-check-icon{
  width:18px;height:18px;
  border:1px solid var(--ink-25);border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,border-color 0.2s;
}
.btn-tool-check.selected .tool-check-icon{
  background:var(--sage-deep);border-color:var(--sage-deep);
}
.tool-check-icon svg{opacity:0;transition:opacity 0.2s;}
.btn-tool-check.selected .tool-check-icon svg{opacity:1;}
.btn-tool-check.selected .tool-check-icon svg polyline{stroke:var(--bg);}
.tools-other{padding:20px 28px 16px;}
.tools-other-input{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--hairline);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-size:15px;padding:14px 2px;border-radius:0;
  outline:none;transition:border-color 0.2s;
}
.tools-other-input:focus{border-color:var(--sage-deep);}
.tools-other-input::placeholder{
  color:var(--ink-45);font-style:italic;
  font-family:'Cormorant Garamond',serif;font-size:17px;
}
.tools-submit-row{padding:0 28px 36px;display:flex;justify-content:flex-end;}

/* ============ TEXT INPUT ============ */
.q-text-zone{
  padding:24px 28px 36px;display:flex;gap:12px;align-items:flex-end;
  border-top:1px solid var(--hairline-soft);margin-top:24px;
}
textarea{
  flex:1;background:transparent;
  border:none;border-bottom:1px solid var(--hairline);
  color:var(--ink);
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,2.5vw,20px);
  padding:14px 2px;border-radius:0;resize:none;
  height:68px;outline:none;line-height:1.55;
  -webkit-appearance:none;transition:border-color 0.2s;
  font-style:italic;
}
textarea::placeholder{color:var(--ink-45);font-style:italic;}
textarea:focus{border-color:var(--sage-deep);}
.btn-send{
  background:var(--ink);border:1px solid var(--ink);color:var(--bg);
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:500;letter-spacing:0.3em;text-transform:uppercase;
  padding:0 28px;cursor:pointer;border-radius:var(--radius-sm);
  height:54px;flex-shrink:0;min-width:96px;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.2s,border-color 0.2s;
}
.btn-send:hover,.btn-send:active{background:var(--sage-deep);border-color:var(--sage-deep);}

/* ============ LOADING ============ */
.loading-zone{
  padding:64px 28px 72px;flex-shrink:0;
  border-top:1px solid var(--hairline-soft);
  text-align:center;
}
.loading-top{
  display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:36px;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.loading-dot{
  width:6px;height:6px;background:var(--sage-deep);border-radius:50%;
  animation:pulse 1.6s infinite;flex-shrink:0;
}
.loading-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,2.6vw,24px);
  color:var(--ink);font-style:italic;
}
.loading-bar-bg{
  height:1px;background:var(--hairline);overflow:hidden;
  max-width:360px;margin:0 auto;
}
@keyframes loadProgress{0%{width:0%}8%{width:12%}20%{width:28%}38%{width:46%}55%{width:62%}72%{width:74%}88%{width:82%}100%{width:86%}}
.loading-bar-animate{height:1px;background:var(--sage-deep);animation:loadProgress 40s ease-out forwards;}
.loading-note{
  font-size:10px;color:var(--ink-45);margin-top:24px;
  letter-spacing:0.28em;text-transform:uppercase;
}

/* ============ RESULTS ============ */
.results-wrap{flex:1;display:flex;flex-direction:column;background:var(--bg);}

/* Results hero — editorial opener */
.r-hero{
  padding:120px 32px 96px;text-align:center;position:relative;overflow:hidden;
  max-width:860px;margin:0 auto;width:100%;
}
.r-hero::before{
  content:'';position:absolute;left:50%;top:72px;transform:translateX(-50%);
  width:56px;height:1px;background:var(--sage-deep);opacity:0.7;
}
.r-eyebrow{
  color:var(--sage-deep);letter-spacing:0.42em;font-size:10px;
  text-transform:uppercase;font-weight:500;margin-bottom:44px;position:relative;
}
.r-headline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,7vw,76px);
  font-weight:400;color:var(--ink);
  line-height:1.02;letter-spacing:-0.018em;
  margin-bottom:40px;position:relative;
  max-width:820px;margin-left:auto;margin-right:auto;
  text-wrap:balance;
}
.r-headline em{font-style:italic;color:var(--sage-deep);}
.r-truth{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(17px,2.3vw,21px);
  color:var(--ink);opacity:0.72;
  line-height:1.65;max-width:540px;
  margin:0 auto;position:relative;
  font-style:italic;
  text-wrap:pretty;
}

/* Identity reframe */
.r-reframe{
  padding:0 32px 72px;
  max-width:860px;margin:0 auto;width:100%;
  text-align:center;
}
.r-reframe-inner{
  border-top:1px solid var(--hairline);
  border-bottom:1px solid var(--hairline);
  padding:44px 20px;
  max-width:620px;margin:0 auto;
  position:relative;
}
.r-reframe-inner::before{
  content:'"';
  position:absolute;left:50%;top:-22px;transform:translateX(-50%);
  background:var(--bg);padding:0 14px;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:44px;color:var(--sage-deep);line-height:1;
}
.r-reframe-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,3.4vw,30px);
  font-style:italic;font-weight:400;
  color:var(--ink);line-height:1.4;
  letter-spacing:-0.005em;
  text-wrap:pretty;
}

/* Recs section */
.recs{
  padding:24px 32px 40px;
  display:flex;flex-direction:column;gap:0;
  max-width:820px;margin:0 auto;width:100%;
}
@keyframes recReveal{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.rec{
  background:transparent;
  border-top:1px solid var(--hairline);
  border-bottom:none;
  padding:56px 0;
  opacity:0;animation:recReveal 0.6s ease forwards;
  position:relative;
}
.rec:last-child{border-bottom:1px solid var(--hairline);}

.rec-header{
  padding:0;
  display:grid;
  grid-template-columns:64px 1fr;
  gap:24px;
  align-items:baseline;
}
.rec-num{
  font-family:'Cormorant Garamond',serif;
  font-size:44px;
  font-style:italic;font-weight:400;
  color:var(--sage-deep);
  line-height:1;letter-spacing:0;
}
.rec-title-wrap{flex:1;display:flex;flex-direction:column;gap:18px;}
.rec-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(26px,4vw,38px);
  color:var(--ink);line-height:1.1;
  font-weight:400;letter-spacing:-0.015em;
  text-wrap:balance;
}
.tool-chip{
  display:inline-flex;align-items:center;gap:8px;
  align-self:flex-start;
  padding:8px 14px;
  border:1px solid var(--sage-deep);
  background:var(--sage-wash);
  border-radius:2px;
  color:var(--ink);
  font-size:10px;font-family:'DM Sans',sans-serif;
  letter-spacing:0.24em;text-transform:uppercase;font-weight:500;
  text-decoration:none;
  transition:background 0.2s,border-color 0.2s,color 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.tool-chip:hover,.tool-chip:active{
  background:var(--sage-deep);color:var(--bg);border-color:var(--sage-deep);
}
.rec-body{
  padding:28px 0 0 88px;
  font-size:clamp(15px,2.2vw,16px);
  color:var(--ink);opacity:0.82;
  line-height:1.85;font-weight:400;
  max-width:680px;
  text-wrap:pretty;
}
.rec-divider{display:none;}
.prompts-section{
  padding:36px 0 0 88px;
}
.prompts-eyebrow{
  font-size:10px;color:var(--sage-deep);
  letter-spacing:0.34em;text-transform:uppercase;
  font-weight:500;margin-bottom:20px;
  display:flex;align-items:center;gap:14px;
}
.prompts-eyebrow::after{
  content:'';flex:1;height:1px;background:var(--sage-line);
}
.prompt-item{
  background:var(--sage-wash-soft);
  border:none;
  border-left:2px solid var(--sage-deep);
  border-radius:0;
  padding:20px 22px;margin-bottom:10px;
  display:flex;gap:18px;align-items:flex-start;
}
.prompt-item:last-child{margin-bottom:0;}
.prompt-text{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(13px,1.9vw,14px);
  color:var(--ink);opacity:0.85;
  line-height:1.85;flex:1;font-weight:400;
}
.copy-btn{
  background:transparent;border:1px solid var(--ink-25);
  color:var(--ink-60);
  font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:0.22em;text-transform:uppercase;font-weight:500;
  padding:8px 14px;cursor:pointer;border-radius:var(--radius-sm);
  flex-shrink:0;min-height:32px;
  transition:border-color 0.2s,color 0.2s,background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.copy-btn:hover,.copy-btn:active,.copy-btn.copied{
  border-color:var(--sage-deep);color:var(--sage-deep);background:var(--bg);
}
.further-reading{
  margin:28px 0 0 88px;
  padding-top:20px;
  border-top:1px solid var(--hairline-soft);
  display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;
  font-size:12px;color:var(--ink-60);line-height:1.7;
  letter-spacing:0.04em;
}
.further-reading a{
  color:var(--sage-deep);text-decoration:none;
  border-bottom:1px solid var(--sage-line);
  padding-bottom:1px;
  transition:border-color 0.2s,color 0.2s;
}
.further-reading a:hover{color:var(--ink);border-color:var(--ink);}

/* Busy season note */
.r-season{
  padding:56px 32px;
  max-width:820px;margin:0 auto;width:100%;
  text-align:center;
}
.r-season-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,2.6vw,22px);
  color:var(--ink);opacity:0.7;
  line-height:1.6;
  font-style:italic;
  max-width:520px;margin:0 auto;
  text-wrap:pretty;
}

/* CTA footer */
.r-cta{
  background:var(--ink);
  border-top:none;padding:120px 32px 140px;text-align:center;
  position:relative;
  color:var(--bg);
}
.r-cta::before{
  content:'';position:absolute;left:50%;top:72px;transform:translateX(-50%);
  width:56px;height:1px;background:var(--sage);opacity:0.7;
}
.r-cta-eyebrow{
  color:var(--sage);letter-spacing:0.42em;font-size:10px;text-transform:uppercase;
  font-weight:500;margin-bottom:44px;
}
.r-cta-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(48px,8vw,92px);
  font-weight:400;color:var(--bg);
  line-height:0.96;margin-bottom:40px;letter-spacing:-0.02em;
}
.r-cta-title em{font-style:italic;color:var(--sage);}
.r-cta-body{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,2.4vw,22px);
  color:var(--sage);opacity:0.85;
  line-height:1.6;max-width:520px;margin:0 auto 56px;
  font-style:italic;
  text-wrap:pretty;
}
.btn-cta-main{
  display:inline-block;background:transparent;border:1px solid var(--sage);
  color:var(--sage);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.36em;text-transform:uppercase;
  padding:22px 60px;text-decoration:none;cursor:pointer;
  transition:background 0.25s,color 0.25s,letter-spacing 0.25s;
  -webkit-tap-highlight-color:transparent;
}
.btn-cta-main:hover{background:var(--sage);color:var(--ink);letter-spacing:0.42em;}
.r-cta-divider{width:1px;height:52px;background:var(--sage);opacity:0.28;margin:48px auto;}
.btn-restart{
  display:block;background:transparent;border:none;
  color:var(--sage);opacity:0.55;
  font-family:'DM Sans',sans-serif;font-size:10px;
  letter-spacing:0.28em;text-transform:uppercase;font-weight:500;
  margin:0 auto;cursor:pointer;padding:10px;
  -webkit-tap-highlight-color:transparent;
  transition:opacity 0.2s;
}
.btn-restart:hover{opacity:1;}

/* ============ GATE (email capture) ============ */
.gate-wrap{
  background:var(--bg);
  border-top:1px solid var(--hairline-soft);
  margin-top:20px;
}
.gate-inner{
  padding:56px 32px 56px;
  max-width:540px;margin:0 auto;
  text-align:center;
  position:relative;
}
.gate-inner::before{
  content:'';position:absolute;left:50%;top:22px;transform:translateX(-50%);
  width:40px;height:1px;background:var(--sage-deep);opacity:0.7;
}
.gate-eyebrow{
  color:var(--sage-deep);letter-spacing:0.4em;font-size:10px;
  text-transform:uppercase;font-weight:500;margin-bottom:24px;margin-top:10px;
}
.gate-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(32px,5vw,44px);
  color:var(--ink);line-height:1.08;margin-bottom:18px;
  font-weight:400;letter-spacing:-0.015em;
}
.gate-title em{font-style:italic;color:var(--sage-deep);}
.gate-sub{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(16px,2.2vw,19px);
  color:var(--ink);opacity:0.7;line-height:1.6;
  margin-bottom:44px;font-style:italic;
  max-width:420px;margin-left:auto;margin-right:auto;
  text-wrap:pretty;
}
.gate-fields{display:flex;flex-direction:column;gap:0;margin-bottom:32px;text-align:left;}
.gate-row{display:flex;gap:0;}
.gate-field{
  flex:1;background:transparent;
  border:none;border-bottom:1px solid var(--hairline);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  font-size:15px;padding:18px 2px;border-radius:0;
  outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;
}
.gate-row .gate-field:first-child{margin-right:18px;}
.gate-field::placeholder{
  color:var(--ink-45);
  font-style:italic;font-family:'Cormorant Garamond',serif;font-size:17px;
}
.gate-field:focus{border-color:var(--sage-deep);}

.btn-gate-submit{
  width:100%;background:var(--ink);color:var(--bg);border:1px solid var(--ink);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.34em;text-transform:uppercase;
  padding:22px 24px;cursor:pointer;border-radius:var(--radius-sm);
  transition:background 0.2s,border-color 0.2s,opacity 0.2s,letter-spacing 0.25s;
  -webkit-tap-highlight-color:transparent;margin-bottom:16px;
}
.btn-gate-submit:hover:not(:disabled){
  background:var(--sage-deep);border-color:var(--sage-deep);letter-spacing:0.4em;
}
.btn-gate-submit:disabled{opacity:0.4;cursor:default;}
.gate-status{
  font-size:12px;color:var(--sage-deep);min-height:18px;
  letter-spacing:0.08em;margin-bottom:8px;text-align:center;
}
.gate-error{
  font-size:12px;color:#a24b4b;min-height:18px;
  margin-bottom:8px;text-align:center;letter-spacing:0.04em;
}
.btn-gate-skip{
  background:transparent;border:none;
  color:var(--ink-45);
  font-family:'DM Sans',sans-serif;font-size:10px;
  letter-spacing:0.24em;text-transform:uppercase;font-weight:500;
  cursor:pointer;padding:8px;
  -webkit-tap-highlight-color:transparent;
  text-decoration:underline;text-underline-offset:4px;
  text-decoration-color:var(--ink-25);
  transition:color 0.2s;
  display:block;width:100%;text-align:center;
}
.btn-gate-skip:hover{color:var(--ink);}

/* ============ RESPONSIVE ============ */
@media(max-width:640px){
  .screen-welcome{padding:88px 26px 104px;min-height:600px;}
  .screen-welcome::before{top:56px;}
  .welcome-eyebrow{margin-bottom:36px;}
  .welcome-title{font-size:clamp(56px,16vw,84px);}
  .welcome-rule{height:52px;margin:40px auto;}
  .welcome-sub{margin-bottom:52px;font-size:18px;}
  .btn-begin{padding:18px 44px;}
  .chat-header{padding:22px 22px 18px;}
  .messages{padding:20px 22px 12px;}
  .q-header{padding:24px 22px 0;}
  .q-options{padding:20px 22px 28px;margin-top:22px;}
  .rank-hint{padding:0 22px;}
  .rank-opts{padding:18px 22px 0;margin-top:18px;}
  .rank-footer{padding:20px 22px 28px;}
  .tools-grid{padding:18px 22px 0;grid-template-columns:1fr;margin-top:18px;border-left:none;}
  .btn-tool-check{border-right:none;}
  .tools-other{padding:16px 22px 10px;}
  .tools-submit-row{padding:0 22px 28px;}
  .q-text-zone{padding:18px 22px 28px;margin-top:18px;}

  .r-hero{padding:84px 24px 72px;}
  .r-hero::before{top:48px;}
  .r-eyebrow{margin-bottom:28px;}
  .r-headline{font-size:clamp(36px,9vw,54px);margin-bottom:28px;}
  .r-reframe{padding:0 24px 48px;}
  .r-reframe-inner{padding:32px 14px;}

  .recs{padding:16px 24px 24px;}
  .rec{padding:44px 0;}
  .rec-header{grid-template-columns:48px 1fr;gap:16px;}
  .rec-num{font-size:32px;}
  .rec-body{padding:24px 0 0 0;}
  .prompts-section{padding:28px 0 0 0;}
  .further-reading{margin:24px 0 0 0;}

  .prompt-item{flex-direction:column;gap:14px;padding:18px 18px;}
  .copy-btn{align-self:flex-start;}
  .r-season{padding:40px 24px;}
  .r-cta{padding:84px 24px 96px;}
  .r-cta::before{top:48px;}
  .r-cta-eyebrow{margin-bottom:28px;}
  .r-cta-title{margin-bottom:28px;}
  .r-cta-body{margin-bottom:40px;}
  .btn-cta-main{padding:18px 44px;}

  .gate-inner{padding:44px 24px 44px;}
  .gate-row{flex-direction:column;}
  .gate-row .gate-field:first-child{margin-right:0;}
}

/* ============ SAVE AS PDF (sits inside dark CTA section) ============ */
.r-save-wrap{
  text-align:center;
  margin:8px auto 44px;
  padding:40px 28px 36px;
  background:rgba(184,196,194,0.06);
  border-top:1px solid rgba(184,196,194,0.22);
  border-bottom:1px solid rgba(184,196,194,0.22);
  max-width:560px;
  border-radius:var(--radius);
}
.r-save-eyebrow{
  color:var(--sage);letter-spacing:0.4em;font-size:10px;
  text-transform:uppercase;font-weight:500;margin-bottom:22px;opacity:0.9;
}
.btn-save-pdf{
  display:inline-flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--sage);color:var(--sage);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  letter-spacing:0.34em;text-transform:uppercase;
  padding:20px 46px;cursor:pointer;border-radius:var(--radius-sm);
  transition:background 0.2s,color 0.2s,letter-spacing 0.25s,border-color 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-save-pdf:hover,.btn-save-pdf:active{
  background:var(--sage);color:var(--ink);border-color:var(--sage);letter-spacing:0.4em;
}
.r-save-hint{
  font-family:'Cormorant Garamond',serif;
  font-size:15px;font-style:italic;
  color:var(--bg);opacity:0.65;
  margin-top:20px;line-height:1.5;
  max-width:380px;margin-left:auto;margin-right:auto;
}
.r-save-hint em{color:var(--sage);font-style:italic;opacity:1;}

/* ============ PRINT (Save as PDF) ============ */
@media print{
  @page{margin:0.55in 0.5in;size:letter;}
  html,body{background:#fff !important;color:#141414 !important;overflow:visible !important;height:auto !important;}
  body{font-size:11pt;}
  .no-print{display:none !important;}
  /* Hide everything that isn't the results screen */
  .screen-welcome,.progress-wrap,.content-wrap,.chat-header,.q-panel,

<body>

<div id="app"></div>
<script>
/* STATE */
const TOTAL_Q = 9;
let phase='welcome',qIdx=0,msgs=[],isTyping=false,newMsgIdx=-1,answers={},rankSelections=[],toolSelections=[],completionFired=false;

/* Silently log answers to Google Forms for analytics.
   Submits an invisible iframe POST so the user never sees it and there is no CORS error. */
function fireCompletion(){
  if(completionFired) return;
  completionFired=true;
  try{
    const FORM_ID='1FAIpQLSeE5CP84yCYZHUuQd75unldI-TONR8QT3cQcS4zeWh_vVAbog';
    const url='https://docs.google.com/forms/d/e/'+FORM_ID+'/formResponse';
    const ts=new Date().toISOString();
    const data={
      'entry.2097554769': ts,                        // Timestamp
      'entry.841084847':  answers.shoot || '',       // Shoot type
      'entry.775103538':  answers.drain || '',       // Biggest time drain (ranked)
      'entry.227701949':  answers.hours || '',       // Hours/week
      'entry.1351187907': answers.feel  || '',       // How it feels
      'entry.453902336':  answers.stage || '',       // Business stage
      'entry.1985695680': answers.solo  || '',       // Solo or team
      'entry.897348903':  answers.goal  || '',       // 6-month goal
      'entry.802900978':  'TOOLS: '+(answers.tools||'(none)')+' | DREAM: '+(answers.dream||'(none)')
    };
    // Build a detached form and submit it into a hidden iframe — no CORS, no visible nav
    const iframe=document.createElement('iframe');
    iframe.name='gf_sink_'+Date.now();
    iframe.style.cssText='position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;border:0;';
    document.body.appendChild(iframe);
    const form=document.createElement('form');
    form.action=url;
    form.method='POST';
    form.target=iframe.name;
    form.style.display='none';
    Object.keys(data).forEach(k=>{
      const inp=document.createElement('input');
      inp.type='hidden';inp.name=k;inp.value=data[k];
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    // Clean up after submit settles
    setTimeout(()=>{try{form.remove();iframe.remove();}catch(e){}},4000);
  }catch(err){console.warn('Analytics submit failed:',err);}
}

/* Trigger the browser's Print → Save as PDF dialog for the results screen */
function downloadPDF(){
  try{window.print();}catch(e){}
}

/* QUESTIONS */
const Qs=[
  {id:'shoot',text:"Let's start with the basics. What do you primarily shoot?",type:'btn',
   opts:['Headshots and branding','Weddings','Families and portraits','Commercial and editorial','Events','A mix of several things']},
  {id:'drain',text:"Outside of actually shooting, what eats your time? Tap in order, biggest drain first. Pick up to three.",type:'rank',
   opts:['Culling through hundreds of images','Editing and retouching','Client emails and communication','Social media and marketing','Admin, invoicing and proposals','Blogging and SEO content','Contracts and client onboarding','Pricing inquiry responses']},
  {id:'hours',text:'About how many hours a week does that cost you?',type:'btn',
   opts:['2 to 4 hours','5 to 8 hours','9 to 12 hours','More than 12 hours, honestly']},
  {id:'feel',text:'And how does spending that time actually feel?',type:'btn',
   opts:['It completely drains me','It is a necessary evil but I manage','It stresses me out and I fall behind','I actually do not mind it that much']},
  {id:'stage',text:'Where are you in your photography business right now?',type:'btn',
   opts:['Just getting started, under 2 years in','Growing and finding my footing','Established but feeling stuck or plateaued','Thriving and looking to scale']},
  {id:'solo',text:'Are you running this business completely on your own?',type:'btn',
   opts:['Yes, completely solo','Mostly solo with occasional help','I have some regular support']},
  {id:'goal',text:'What is your biggest goal for your business in the next 6 months?',type:'btn',
   opts:['Book more clients','Raise my prices and work less','Work fewer hours overall','Build passive income or an education side','Get better at the craft','A mix of a few of these']},
  {id:'tools',text:'Are you using any AI tools right now? Check everything that applies.',type:'tools'},
  {id:'dream',text:"Last one. If you got those hours back every week, what would you actually do with them?",type:'txt',
   ph:'More time with my family, shoot personal work, rest, travel...'}
];

const TOOL_OPTIONS=['ChatGPT','Claude','Aftershoot','Lightroom AI','Photoshop AI','Evoto','Imagen AI','Canva AI','None yet'];

/* BUILD RECS based on answers */
function buildRecs(){
  const shoot   = answers.shoot   || '';
  const drains  = parseDrains(answers.drain || '');
  const hours   = answers.hours   || '';
  const feel    = answers.feel    || '';
  const stage   = answers.stage   || '';
  const solo    = answers.solo    || '';
  const goal    = answers.goal    || '';
  const tools   = answers.tools   || '';
  const dream   = answers.dream   || '';

  const urgency    = getUrgency(hours);
  const register   = getRegister(feel);
  const sophLevel  = getSoph(stage);
  const goalFrame  = getGoalFrame(goal);
  const toolLevel  = getToolLevel(tools);
  const dreamTone  = getDreamTone(dream);

  const candidates = [];
  candidates.push(buildBrandVoiceRec(shoot, urgency, register, sophLevel, goalFrame, toolLevel, dream));
  if(drains[0]) candidates.push(buildDrainRec(drains[0], shoot, urgency, register, sophLevel, goalFrame, solo, true));
  else candidates.push(buildDrainRec('Client emails and communication', shoot, urgency, register, sophLevel, goalFrame, solo, true));
  if(drains[1]) candidates.push(buildDrainRec(drains[1], shoot, urgency, register, sophLevel, goalFrame, solo, false));
  if(drains[2]) candidates.push(buildDrainRec(drains[2], shoot, urgency, register, sophLevel, goalFrame, solo, false));

  // Tool-gap recommendation: if user has 0-2 tools, suggest one they're not using
  const gapRec = buildToolGapRec(tools, shoot, urgency, register, sophLevel, goalFrame, solo, drains);
  if(gapRec) candidates.push(gapRec);

  candidates.push(buildStageRec(stage, goal));

  // Fallback drain pool for filling gaps without duplicating
  const fallbackDrains = ['Editing and retouching','Social media and marketing','Admin, invoicing and proposals','Blogging and SEO content','Culling through hundreds of images','Contracts and client onboarding','Pricing inquiry responses','Client emails and communication'];
  const used = new Set(candidates.map(r => r.title));
  for(const d of fallbackDrains){
    if(candidates.length >= 5) break;
    const r = buildDrainRec(d, shoot, urgency, register, sophLevel, goalFrame, solo, false);
    if(!used.has(r.title)){
      candidates.push(r);
      used.add(r.title);
    }
  }

  // Final dedupe by title — keep first occurrence
  const seen = new Set();
  const result = [];
  for(const r of candidates){
    if(!seen.has(r.title)){
      seen.add(r.title);
      result.push(r);
    }
    if(result.length >= 5) break;
  }
  return result;
}

/* TOOL GAP REC — suggests a high-leverage tool the user isn't already using.
   Rules: never suggest Aftershoot and Imagen together; pick the highest-priority gap. */
function buildToolGapRec(toolsStr, shoot, urgency, register, sophLevel, goalFrame, solo, drains){
  if(!toolsStr) return null;
  const userTools = toolsStr.split(',').map(t=>t.trim().toLowerCase());
  const count = userTools.filter(t => t && t !== 'none yet').length;
  // Only suggest a gap filler if user has 0, 1, or 2 tools
  if(count > 2) return null;

  const has = (name) => userTools.some(t => t.includes(name.toLowerCase()));
  const hasAftershoot = has('aftershoot');
  const hasImagen = has('imagen');
  const hasChatGPT = has('chatgpt');
  const hasClaude = has('claude');
  const hasEvoto = has('evoto');
  const hasLightroom = has('lightroom');
  const hasPhotoshop = has('photoshop');
  const hasCanva = has('canva');

  const shootLabel = shootShort(shoot);
  const intro = sophIntro(sophLevel);
  const soloNote = solo === 'Yes, completely solo' ? ' Running solo, this is exactly the kind of leverage you need.' : '';

  // Build gap candidates in priority order. Skip Aftershoot if they have Imagen, skip Imagen if they have Aftershoot.
  const gaps = [];

  // 1. Conversational AI (ChatGPT or Claude) — only recommend if they have neither
  if(!hasChatGPT && !hasClaude){
    gaps.push({
      key: 'claude',
      title: 'Add a conversational AI to your toolkit',
      tool: 'Claude',
      tool_url: 'https://claude.ai',
      body: `You do not have a conversational AI in your stack yet, and that is the single biggest gap to close. Captions, inquiry replies, blog drafts, pricing emails, workflow design — all of it gets faster the moment you have one of these running alongside you. Tausha personally uses Claude. ChatGPT works too. Pick one and commit.${soloNote}`,
      prompts: [
        `I am a ${shootLabel} photographer based in [your city]. This is my first time using you in a real way. Help me figure out the three highest-leverage places an AI like you can save me time in my photography business this week. Ask me one clarifying question first before you answer.`,
        `I am a ${shootLabel} photographer. Write a short inquiry reply to this message: [paste the inquiry]. Make it sound like a real person wrote it. Keep it under 120 words. End with one specific question that moves the conversation forward.`,
        `Help me draft three Instagram captions for a recent ${shootLabel} session. Here is what actually happened during the shoot: [describe a real detail]. Make each caption sound like me, not like a template. Do not use generic inspirational language. My tone is [describe it].`
      ]
    });
  }

  // 2. Culling — Aftershoot OR Imagen, never both. Only suggest if user has neither.
  if(!hasAftershoot && !hasImagen){
    gaps.push({
      key: 'aftershoot',
      title: 'Stop culling by hand',
      tool: 'Aftershoot',
      tool_url: 'https://aftershoot.com',
      body: `Culling is the single most time-consuming part of post-production for most ${shootLabel} photographers, and it is also the easiest to hand off to AI. Aftershoot learns your selection style over time and gets more accurate the more you use it. It is not guessing at what a good image looks like in general — it is learning what a good image looks like to you.${soloNote}`,
      prompts: [
        `I am a ${shootLabel} photographer who shoots around [number] images per session. I want to set up Aftershoot to cull in my specific style. I tend to keep [describe what you keep: sharp eyes, genuine expressions, clean backgrounds, etc.] and reject [describe what you reject]. Walk me through how to train it on my selects, what settings to configure first, and how long it typically takes before the culls feel accurate.`,
        `I am a ${shootLabel} photographer. Help me build a post-shoot workflow that puts Aftershoot at the very front so I am not touching a single image before it has already culled the session. Walk me through the order of steps from card off camera to delivery-ready selects.`,
        `I have been using Aftershoot for a little while and my culls are not matching my style yet. Here is what I am noticing: [describe the specific problem]. Help me figure out which settings or training adjustments will fix this. Be specific.`
      ]
    });
  }

  // 3. Portrait retouching — Evoto
  if(!hasEvoto){
    gaps.push({
      key: 'evoto',
      title: 'Cut retouching time with Evoto',
      tool: 'Evoto',
      tool_url: 'https://www.evoto.ai',
      body: `Evoto is purpose-built for portrait retouching and handles skin in seconds at a level that used to take serious manual work. It reads the face and makes targeted adjustments, not a filter applied across the board. For ${shootLabel} work, it is one of the biggest time savers on the market right now.${soloNote}`,
      prompts: [
        `I am a ${shootLabel} photographer and I want to start using Evoto for skin retouching. Walk me through what to set up first, how to build a preset that matches my editing style, and what order of operations works best when paired with Lightroom. Be specific.`,
        `I want to build a retouching workflow that uses Evoto for skin and another tool for backgrounds, clothing, and environment edits. Walk me through the order of operations so I am not duplicating work. Be specific about which tool handles what.`,
        `Here is my current editing workflow step by step: [describe it]. I am a ${shootLabel} photographer. Tell me specifically where Evoto fits in and what time savings to expect on a typical session.`
      ]
    });
  }

  // 4. Lightroom AI masking — only if they have Lightroom-adjacent context
  if(!hasLightroom){
    gaps.push({
      key: 'lightroom',
      title: 'Use Lightroom\'s AI masking, not just its sliders',
      tool: 'Lightroom',
      tool_url: 'https://www.adobe.com/products/photoshop-lightroom.html',
      body: `If you already use Lightroom (or Lightroom Classic), you are probably using a small fraction of what it can do. The AI masking tools — Subject Select, Background Select, Sky Select, object masks — handle work that used to take manual brushing. For ${shootLabel} photographers, they collapse 10 minutes of per-image editing into 30 seconds.${soloNote}`,
      prompts: [
        `I use Lightroom Classic for editing ${shootLabel} sessions. Walk me through the AI masking tools I should be using to speed up my workflow: Subject Selection, Background Removal, Sky, and any others relevant to my shoot type. Tell me when to use each one and what they save the most time on for ${shootLabel} specifically.`,
        `Help me build a Lightroom preset system designed for a ${shootLabel} photographer. I want to minimize per-image tweaking. Walk me through what the base preset should handle and where AI masks should take over.`,
        `Here is my current Lightroom workflow: [describe it]. Tell me specifically where AI masks could take over and estimate how much time that saves per session.`
      ]
    });
  }

  // 5. Canva AI — content & marketing
  if(!hasCanva){
    gaps.push({
      key: 'canva',
      title: 'Use Canva AI for marketing assets you keep putting off',
      tool: 'Canva',
      tool_url: 'https://www.canva.com',
      body: `Carousels, pricing guides, welcome PDFs, Pinterest pins, Reels covers — the marketing assets you know you should be making but never find time for. Canva's AI tools (Magic Design, Magic Write, background removal) turn what used to be a full design afternoon into a 15-minute job. It is not going to replace a designer, but for everything you are currently doing in your phone's notes app, it is a massive upgrade.${soloNote}`,
      prompts: [
        `I am a ${shootLabel} photographer. Using Canva AI, help me build a pricing guide PDF I can send to inquiring clients. It should feel on-brand (my tone is [describe it]) and cover [describe what should be in it]. Walk me through what to create in Canva step by step.`,
        `Design a set of Instagram carousel templates I can reuse every week. I am a ${shootLabel} photographer. Give me five slide structures that actually get saves and shares, not generic "tips" posts. Describe the layout of each slide.`,
        `I need to create a welcome PDF for new clients who just booked a ${shootLabel} session. Help me outline what belongs in it, what tone to use, and how to design it in Canva so it feels premium without being over-designed.`
      ]
    });
  }

  if(gaps.length === 0) return null;

  const pick = gaps[0];
  return {
    title: pick.title,
    tool: pick.tool,
    tool_url: pick.tool_url,
    suggestion: pick.body,
    prompts_intro: intro,
    prompts: pick.prompts,
    blog_posts: []
  };
}

function parseDrains(drainStr){
  if(!drainStr) return [];
  return drainStr.split(', ').map(d=>d.replace(/^#\d+:\s*/,'').trim()).filter(Boolean);
}

function getUrgency(hours){
  if(hours.includes('2 to 4')) return 'low';
  if(hours.includes('5 to 8')) return 'mid';
  if(hours.includes('9 to 12')) return 'high';
  if(hours.includes('More than 12')) return 'urgent';
  return 'mid';
}

function getRegister(feel){
  if(feel.includes('drains')) return 'depleted';
  if(feel.includes('necessary evil')) return 'managing';
  if(feel.includes('fall behind')) return 'behind';
  if(feel.includes('do not mind')) return 'fine';
  return 'managing';
}

function getSoph(stage){
  if(stage.includes('getting started')) return 'new';
  if(stage.includes('footing')) return 'growing';
  if(stage.includes('stuck')) return 'stuck';
  if(stage.includes('scale')) return 'thriving';
  return 'growing';
}

function getGoalFrame(goal){
  if(goal.includes('Book more')) return 'revenue';
  if(goal.includes('Raise my prices')) return 'premium';
  if(goal.includes('fewer hours')) return 'efficiency';
  if(goal.includes('passive income')) return 'runway';
  if(goal.includes('craft')) return 'creative';
  return 'mixed';
}

function getToolLevel(tools){
  if(!tools || tools === 'None yet' || tools.trim() === '') return 'none';
  if(tools.includes('ChatGPT') && !tools.includes(',')) return 'chatgpt';
  const count = (tools.match(/,/g)||[]).length + 1;
  if(count >= 3) return 'power';
  return 'casual';
}

function getDreamTone(dream){
  const d = dream.toLowerCase();
  if(d.includes('famil') || d.includes('kids') || d.includes('partner') || d.includes('husband') || d.includes('wife')) return 'family';
  if(d.includes('shoot') || d.includes('creat') || d.includes('personal work') || d.includes('camera') || d.includes('craft')) return 'creative';
  if(d.includes('course') || d.includes('workshop') || d.includes('educat') || d.includes('build') || d.includes('passive')) return 'building';
  if(d.includes('rest') || d.includes('sleep') || d.includes('nothing') || d.includes('relax') || d.includes('breath')) return 'rest';
  return 'vague';
}

/* URGENCY OPENERS */
function urgencyOpener(drain, urgency, register, shoot){
  const shootLabel = shootShort(shoot);
  const drainLabel = drain.toLowerCase();

  const openers = {
    depleted: {
      low: `If ${drainLabel} is part of what's leaving you depleted, it's costing more than time. Even a smaller drain that chips away at your energy is worth fixing.`,
      mid: `${capitalize(drainLabel)} is taking a real chunk of your week, and if it's draining you on top of that, it's costing more than hours. It's costing creative energy you don't get back.`,
      high: `For a ${shootLabel} photographer, losing this much of your week to ${drainLabel} while feeling completely depleted is not a hustle problem. It's a system problem. This is where to start.`,
      urgent: `The amount of time ${drainLabel} is taking from you each week, combined with how depleted it's leaving you, is not sustainable. The fix is here and it's more straightforward than it probably feels right now.`
    },
    managing: {
      low: `Managing it is not the same as it not costing you anything. Here is where a small change makes a disproportionate difference.`,
      mid: `"I manage" is doing a lot of work there. For a ${shootLabel} photographer, the time ${drainLabel} takes each week adds up in ways that are easy to ignore until they're not.`,
      high: `You've made peace with how much ${drainLabel} takes from your week. That's understandable. It doesn't mean it deserves that much of your time.`,
      urgent: `The hours ${drainLabel} is taking each week are significant, and managing it is not the same as fixing it. Here is what's actually possible.`
    },
    behind: {
      low: `Even when the time investment feels small, if ${drainLabel} is stressing you out and pushing you behind, the fix is not working faster. Here is the specific thing that changes this.`,
      mid: `If ${drainLabel} is stressing you out and pushing you behind, that's a signal the current approach isn't working. Here is the direct exit.`,
      high: `The amount of time ${drainLabel} is taking combined with the stress of constantly falling behind is a clear signal. Here is what changes it.`,
      urgent: `${capitalize(drainLabel)} is consuming an enormous amount of your week and the stress of falling behind makes it worse. Here is the most direct path out.`
    },
    fine: {
      low: `You're in good shape here. But if you ever want to free up even more time for the work you actually love, this is where it could go.`,
      mid: `You don't mind it, which is genuinely rare. But the time it takes each week could be doing something else. Worth knowing there's a better way if you ever want it.`,
      high: `Even if it doesn't bother you, the amount of time ${drainLabel} takes each week is significant. Here is what's possible if you decide you want it back.`,
      urgent: `Even if you're at peace with it, the volume of time ${drainLabel} is consuming each week is worth looking at. Here is what reclaiming it actually looks like.`
    }
  };
  return (openers[register] || openers.managing)[urgency] || '';
}

function shootShort(shoot){
  if(shoot.includes('Headshot')) return 'headshot';
  if(shoot.includes('Wedding')) return 'wedding';
  if(shoot.includes('Famil')) return 'family portrait';
  if(shoot.includes('Commercial')) return 'commercial';
  if(shoot.includes('Event')) return 'event';
  return 'photography';
}

function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

/* GOAL CLOSING SENTENCES */
function goalCloser(goal, tool){
  const t = tool || 'this';
  if(goal.includes('Book more')) return `Every hour you reclaim from ${t} is an hour you can put toward the thing that actually fills your calendar.`;
  if(goal.includes('Raise my prices')) return `Polished systems signal premium. This is part of how you close the gap between your photography and what it communicates about your business.`;
  if(goal.includes('fewer hours')) return `This is a direct path to fewer hours. No growth framing, no upsell. Just less of this on your plate.`;
  if(goal.includes('passive income')) return `Getting your existing business running on less manual energy is how you clear the runway for what you're building next.`;
  if(goal.includes('craft')) return `The hours this gives back are hours you could spend behind a camera. That's the whole point.`;
  return `This is one less thing standing between you and the business you're actually trying to build.`;
}

/* SOPH PROMPT INTRO */
function sophIntro(sophLevel){
  if(sophLevel === 'new') return 'Start here. One step at a time:';
  if(sophLevel === 'growing') return 'You\'ve outgrown the way you\'ve been doing this. Here\'s what\'s next:';
  if(sophLevel === 'stuck') return 'This is a reframe, not a checklist. Read it that way:';
  if(sophLevel === 'thriving') return 'You already know the basics. Here\'s the higher-leverage move:';
  return 'Ready-to-use prompts:';
}

/* REC 01: BRAND VOICE — always first */
function buildBrandVoiceRec(shoot, urgency, register, sophLevel, goalFrame, toolLevel, dream){
  const shootLabel = shootShort(shoot);

  let suggestion = '';

    suggestion = `This is the one thing that makes everything else you do with AI actually sound like you, not like a tool. When your AI knows your voice, your ideal client, your tone, and what you would never say, your captions and emails stop sounding generated and start sounding like the photographer who made those images. You do not need to overhaul anything. You just need to do this one thing first. These prompts work in any AI tool. No experience needed.`;
  } else if(toolLevel === 'chatgpt'){
    suggestion = `You're already using ChatGPT, which means you've crossed the hardest barrier. The gap between what you're getting now and what's possible is almost entirely about specificity. A brand voice document is what closes that gap. Once your AI knows who you are, who you're talking to, and what you would never sound like, the outputs stop being generic and start being actually useful. These prompts work in ChatGPT. Tausha personally uses Claude, but the approach is the same.`;

/* BUILD RESULTS HEADLINE from dream */
function buildHeadline(dream, shoot){
  const tone = getDreamTone(dream);
  const shootLabel = shootShort(shoot);
  if(!dream || dream.trim() === '') return 'Here is exactly where to start';
  if(tone === 'family') return `Here's how to buy back the hours you'd spend with the people who matter most`;
  if(tone === 'creative') return `Here's what's keeping you from shooting the work you actually want to make`;
  if(tone === 'building') return `Here's how to clear the runway for what you're building next`;
  if(tone === 'rest') return `Here's what needs to change so you can actually rest`;
  return `Here's exactly where to start`;
}

function buildTruthLine(dream, feel){
  const tone = getDreamTone(dream);
  if(tone === 'family') return 'You got into this to build a life, not just a business. These recommendations are designed to give you more of both.';
  if(tone === 'creative') return 'The work that made you pick up a camera deserves more of your time than the business of photography is currently allowing.';
  if(tone === 'building') return 'Your existing business needs to run on less manual energy before there is anything left to put into what you are building next.';
  if(tone === 'rest') return 'Rest is not a reward for finishing everything. It is the thing that makes the rest of this sustainable.';
  return 'You didn\'t get into this to spend Sunday night answering inquiry emails.';
}

/* HELPERS */
function el(id){return document.getElementById(id);}
function scrollToBottom(){setTimeout(()=>{window.scrollTo(0,document.body.scrollHeight);},80);}

function copyPrompt(btn){
  const item=btn.closest('.prompt-item');
  const text=item.querySelector('.prompt-text').textContent||'';
  const finish=()=>{btn.textContent='Copied';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2200);};
  const fallback=()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');finish();}catch(e){btn.textContent='Select + copy';}document.body.removeChild(ta);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(finish).catch(fallback);}else{fallback();}
}

/* RENDER */
function scrollTopAll(){
  // Scroll our own window AND ask parent (Squarespace iframe host) to scroll to top
  try{window.scrollTo(0,0);}catch(e){}
  try{document.documentElement.scrollTop=0;document.body.scrollTop=0;}catch(e){}
  try{window.parent.postMessage({type:'scrollTop'},'*');}catch(e){}
  // Also ask parent to scroll element into view — many iframe hosts listen for this
  try{
    const rect=document.getElementById('app')?.getBoundingClientRect();
    window.parent.postMessage({type:'scrollToIframe',top:rect?rect.top:0},'*');
  }catch(e){}
}
function render(){
  const app=el('app');if(!app)return;
  if(phase==='welcome'){app.innerHTML=screenWelcome();}
  else if(phase==='chat'){
    app.innerHTML=screenChat();
    if(!isTyping&&qIdx<Qs.length&&Qs[qIdx].type==='txt'){setTimeout(()=>{const t=el('ainput');if(t)t.focus();},80);}
    // On entering chat for the first time, scroll to top so first question is visible.
    // Within chat (question-to-question) keep the default bottom-scroll behavior.
    if(msgs.length===0){setTimeout(scrollTopAll,30);}else{scrollToBottom();}
  }
  else if(phase==='loading'){app.innerHTML=screenLoading();setTimeout(scrollTopAll,30);setTimeout(()=>{phase='results';render();},3200);}
  else if(phase==='gate'){app.innerHTML=screenChat();}  
  else{app.innerHTML=screenResults();setTimeout(scrollTopAll,30);fireCompletion();}
}

      panel=buildToolsPanel(q);
    }else{
      panel=`<div class="q-panel"><div class="q-header"><p class="q-text">${q.text}</p></div><div class="q-text-zone"><textarea id="ainput" placeholder="${q.ph}" onkeydown="handleKey(event)" rows="2"></textarea><button class="btn-send" onclick="submitText()">Send</button></div></div>`;
    }
  }
  if(phase==='gate'){
    panel='';
  }
  const barPct = pct;
  const progDisplay = `${prog} of ${TOTAL_Q}`;
  return`
    <div class="progress-wrap"><div class="progress-fill" style="width:${barPct}%"></div></div>
    <div class="content-wrap">
    <div class="chat-header"><div class="avatar"><div class="avatar-dot"></div></div><span class="chat-name">AI Time Audit</span><span class="prog-label">${progDisplay}</span></div>
    <div id="msgs" class="messages">${historyHTML}${typingHTML}</div>
    ${panel}
    </div>`;}

function buildRankPanel(q){
  const optsHTML=q.opts.map(opt=>{
    const ri=rankSelections.indexOf(opt);
    const ranked=ri!==-1;
    return`<button class="btn-rank${ranked?' ranked':''}" onclick="toggleRank(this)" data-v="${opt.replace(/"/g,'&quot;')}"><span class="rank-badge">${ranked?ri+1:''}</span><span class="rank-label">${opt}</span></button>`;
  }).join('');
  const count=rankSelections.length;
  const tally=count===0?'None selected':count===1?'1 selected':`${count} selected`;
  return`<div class="q-panel"><div class="q-header"><p class="q-text">${q.text}</p></div><p class="rank-hint">Tap your biggest drain first. Pick up to 3, or just 1 if that's your answer.</p><div class="rank-opts">${optsHTML}</div><div class="rank-footer"><span class="rank-tally">${tally}</span><button class="btn-rank-next" onclick="submitRank()"${count===0?' disabled':''}>Next</button></div></div>`;}

function buildToolsPanel(q){
  const checkHTML=TOOL_OPTIONS.map(t=>{
    const sel=toolSelections.includes(t);
    return`<button class="btn-tool-check${sel?' selected':''}" onclick="toggleTool(this)" data-v="${t}">
      <span class="tool-check-icon"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      ${t}
    </button>`;
  }).join('');
  return`<div class="q-panel"><div class="q-header"><p class="q-text">${q.text}</p></div><div class="tools-grid">${checkHTML}</div><div class="tools-other"><input class="tools-other-input" id="tools-other" type="text" placeholder="Anything else? Type it here..."></div><div class="tools-submit-row"><button class="btn-rank-next" onclick="submitTools()">Next</button></div></div>`;}

function toggleRank(btn){
  const val=btn.dataset.v;
  const idx=rankSelections.indexOf(val);
  if(idx!==-1){rankSelections.splice(idx,1);}
  else{if(rankSelections.length>=3)return;rankSelections.push(val);}
  const q=Qs[qIdx];const app=el('app');const existing=app.querySelector('.q-panel');
  if(existing){const tmp=document.createElement('div');tmp.innerHTML=buildRankPanel(q);existing.replaceWith(tmp.firstElementChild);}
}

function toggleTool(btn){
  const val=btn.dataset.v;
  const idx=toolSelections.indexOf(val);
  if(idx!==-1){toolSelections.splice(idx,1);btn.classList.remove('selected');}
  else{toolSelections.push(val);btn.classList.add('selected');}
}

function submitRank(){
  if(rankSelections.length===0)return;
  const answer=rankSelections.map((s,i)=>`#${i+1}: ${s}`).join(', ');
  rankSelections=[];
  processAnswer(answer);
}

function submitTools(){
  const other=(el('tools-other')?.value||'').trim();
  let selected=[...toolSelections];
  if(other) selected.push(other);
  toolSelections=[];
  const answer=selected.length>0?selected.join(', '):'None yet';
  processAnswer(answer);
}

function screenLoading(){
  const h=msgs.map(m=>m.role==='bot'?`<div class="msg-bot"><div class="bot-icon"><div class="bot-dot"></div></div><div class="bot-bbl">${m.content}</div></div>`:`<div class="msg-user"><div class="user-bbl">${m.content}</div></div>`).join('');
  return`<div class="progress-wrap"><div class="progress-fill" style="width:100%"></div></div><div class="content-wrap"><div class="chat-header"><div class="avatar"><div class="avatar-dot"></div></div><span class="chat-name">AI Time Audit</span><span class="prog-label">9 of 9</span></div><div id="msgs" class="messages">${h}</div><div class="loading-zone"><div class="loading-top"><span class="loading-dot"></span><span class="loading-text">Pulling your personalized recommendations together</span></div><div class="loading-bar-bg"><div class="loading-bar-animate"></div></div><p class="loading-note">About 30 to 45 seconds</p></div></div>`;}

function screenResults(){
  const recs=buildRecs();
  const shoot=answers.shoot||'';
  const dream=answers.dream||'';
  const feel=answers.feel||'';

  const headline=buildHeadline(dream,shoot);
  const truthLine=buildTruthLine(dream,feel);
  const dreamDisplay=dream?`You said you want to ${dream.charAt(0).toLowerCase()+dream.slice(1).replace(/\.+$/,'')}.`:'';

  const recsHTML=recs.map((r,i)=>{
    const numStr=String(i+1).padStart(2,'0');
    const toolHTML=(r.tool&&r.tool_url)?`<a href="${r.tool_url}" target="_blank" class="tool-chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${r.tool}</a>`:'';
    const promptsHTML=(r.prompts||[]).map(p=>`<div class="prompt-item"><p class="prompt-text">${p}</p><button class="copy-btn" onclick="copyPrompt(this)">Copy</button></div>`).join('');
    const blogLinks=(r.blog_posts||[]).filter(b=>b&&b.url&&b.title).map(b=>`<a href="${b.url}" target="_blank">${b.title} &rarr;</a>`).join(' &nbsp;&middot;&nbsp; ');
    const furtherHTML=blogLinks?`<div class="further-reading"><span>Further reading —</span> ${blogLinks}</div>`:'';
    return`<div class="rec" style="animation-delay:${i*100}ms">
      <div class="rec-header"><span class="rec-num">${numStr}</span><div class="rec-title-wrap"><div class="rec-title">${r.title}</div>${toolHTML}</div></div>
      <div class="rec-body">${r.suggestion}</div>
      ${promptsHTML?`<div class="prompts-section"><div class="prompts-eyebrow">${r.prompts_intro||'Ready-to-use prompts'}</div>${promptsHTML}</div>`:''}
      ${furtherHTML}
    </div>`;
  }).join('');

  return`<div class="results-wrap">
    <div class="r-hero">
      <div class="r-eyebrow">Your Results</div>
      <h2 class="r-headline">${headline}</h2>
      ${dreamDisplay?`<p class="r-truth">${dreamDisplay} ${truthLine}</p>`:`<p class="r-truth">${truthLine}</p>`}
    </div>
    <div class="r-reframe">
      <div class="r-reframe-inner">
        <p class="r-reframe-text">Changing your workflow isn't giving up on your craft. It's deciding that your creative energy is worth protecting.</p>
      </div>
    </div>
    <div class="recs">${recsHTML}</div>
    <div class="r-season">
      <p class="r-season-text">If you're reading this in the middle of your busy season, pick one thing from this list and start there. That's enough.</p>
    </div>
    <div class="r-cta">
      <div class="r-cta-eyebrow">Ready to go deeper?</div>
      <h3 class="r-cta-title">Work smarter.<br><em>Shoot more.</em></h3>
      <p class="r-cta-body">In private mentoring, we work through business strategy, lighting, workflow, and time management. Every session is built around where you actually are and what will move the needle fastest.</p>
      <a href="https://www.taushadickinson.com/workshops" target="_blank" class="btn-cta-main">Explore Mentoring</a>
      <div class="r-cta-divider"></div>
      <div class="r-save-wrap no-print">
        <p class="r-save-eyebrow">Want to keep these?</p>
        <button class="btn-save-pdf" onclick="downloadPDF()">Download as PDF</button>
        <p class="r-save-hint">Opens your print dialog — choose <em>Save as PDF</em> as the destination.</p>
      </div>
      <button class="btn-restart no-print" onclick="startChat()">Start the audit over</button>
    </div>
  </div>`;}

/* INTERACTION */
function startChat(){phase='chat';msgs=[];qIdx=0;isTyping=false;newMsgIdx=-1;answers={};rankSelections=[];toolSelections=[];completionFired=false;render();}

function answerBtn(btn){
  btn.classList.add('selected');
  document.querySelectorAll('.btn-opt').forEach(b=>{b.style.pointerEvents='none';b.style.opacity=(b===btn)?'1':'0.3';});
  setTimeout(()=>processAnswer(btn.dataset.v),240);
}

function processAnswer(a){
  answers[Qs[qIdx].id]=a;
  newMsgIdx=msgs.length;
  msgs.push({role:'bot',content:Qs[qIdx].text});
  msgs.push({role:'user',content:a});
  qIdx++;isTyping=true;render();scrollToBottom();
  setTimeout(()=>{isTyping=false;if(qIdx<Qs.length){render();scrollToBottom();}else{phase='loading';render();}},620);
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitText();}}
function submitText(){const t=el('ainput');if(!t||!t.value.trim())return;processAnswer(t.value.trim());}

function reportHeight(){
  const h=document.getElementById('app')?.offsetHeight||document.body.offsetHeight;
  window.parent.postMessage({type:'resize',height:h},'*');
}
const resizeObs=new ResizeObserver(()=>reportHeight());
resizeObs.observe(document.getElementById('app')||document.body);
reportHeight();
setInterval(reportHeight,500);

render();
</script>


</body></html>
